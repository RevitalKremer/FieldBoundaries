<!DOCTYPE html>
<html>
<head>
    <title>Field Boundaries – SAM</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/findboundaries.css') }}">
    <script>
        function initializeMap() { initMap(); }

        function gm_authFailure() {
            document.getElementById('map').innerHTML = `
                <div class="error-container">
                    <h4>Google Maps API Error</h4>
                    <p>Please configure the Google Maps API key.</p>
                </div>`;
            document.getElementById('runBtn').disabled = true;
        }

        const googleMapsApiKey = "{{ google_maps_api_key }}";
    </script>
    <script src="{{ url_for('static', filename='js/fieldboundaries_sam.js', v=timestamp) }}"></script>
    <script async defer
        src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&libraries=drawing,geometry&callback=initializeMap">
    </script>
</head>
<body>

    <!-- Hidden pipeline fields -->
    <input type="hidden" id="pointX">
    <input type="hidden" id="pointY">
    <input type="hidden" id="step1-latitude">
    <input type="hidden" id="step1-longitude">
    <input type="hidden" id="radiusSize" value="40">
    <img id="previewImage" src="" alt="" style="display:none">
    <span id="samStatus" style="display:none"></span>
    <button id="samNext" style="display:none"></button>
    <img id="samResultImage" style="display:none">

    <div class="step-row" id="step0">
        <div class="operation">
            <h3>Field Boundary Detection</h3>
            <div class="step-instructions">
                <p><strong>Instructions:</strong></p>
                <ol>
                    <li>Navigate to a field on the map</li>
                    <li>Click inside the field to select a point</li>
                    <li>Click "Detect Boundary"</li>
                </ol>
                <p><strong>Status:</strong> <span id="mapStatus">Select a point on the map</span></p>
                <p id="pipelineStatusRow" style="display:none"><strong>Progress:</strong> <span id="pipelineStatus"></span></p>
                <div style="margin-top: 15px;">
                    <div class="coordinate-container">
                        <label for="latitude" class="coordinate-label">Latitude:</label>
                        <input type="number" id="latitude" name="latitude" step="0.000001" placeholder="-90 to 90" class="coordinate-input">
                    </div>
                    <div class="coordinate-container">
                        <label for="longitude" class="coordinate-label">Longitude:</label>
                        <input type="number" id="longitude" name="longitude" step="0.000001" placeholder="-180 to 180" class="coordinate-input">
                    </div>
                </div>
            </div>
        </div>
        <div class="map-container">
            <div id="map"></div>
            <div class="map-controls">
                <label>Zoom:</label>
                <input type="range" id="zoomSlider" min="1" max="21" value="17">
                <span id="zoomLevel">17</span>
            </div>
            <div id="resultInfo" class="area-display" style="display:none;">
                <p><strong>Field Area:</strong> <span id="fieldArea">—</span></p>
            </div>
        </div>
        <div class="button-container">
            <button class="next-button" id="runBtn" onclick="processStep0()" disabled>Detect Boundary</button>
            <button class="next-button" id="downloadBtn" onclick="window.location.href='/download_geojson'" disabled style="margin-top: 10px;">Download GeoJSON</button>
        </div>
    </div>

</body>
</html>
