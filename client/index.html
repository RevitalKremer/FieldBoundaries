<!DOCTYPE html>
<html>
<head>
    <title>Field Boundaries</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script>
        function initializeMap() { initMap(); }

        function gm_authFailure() {
            document.getElementById('map').innerHTML = `
                <div class="error-container">
                    <h4>Google Maps API Error</h4>
                    <p>Please configure the Google Maps API key.</p>
                </div>`;
            document.getElementById('runBtn').disabled = true;
        }

        const googleMapsApiKey = "{{ google_maps_api_key }}";
    </script>
    <script src="{{ url_for('static', filename='js/app.js', v=timestamp) }}"></script>
    <script async defer
        src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&libraries=geometry&callback=initializeMap">
    </script>
</head>
<body>

    <!-- Hidden pipeline fields -->
    <input type="hidden" id="latitude">
    <input type="hidden" id="longitude">
    <img id="previewImage" src="" alt="" style="display:none">

    <div id="map"></div>

    <div id="search-bar">
        <input id="searchInput" type="text" placeholder="Search location…" onkeydown="if(event.key==='Enter') searchLocation()">
        <button onclick="searchLocation()">&#x2315;</button>
    </div>

    <div id="bottom-bar">
        <div id="status-row">
            <span id="loader" style="display:none"></span>
            <span id="statusText">Click on the map to select a point inside a field</span>
            <span id="fieldArea" style="display:none"></span>
        </div>
        <div id="buttons">
            <button id="runBtn" onclick="detectBoundary()" disabled>Detect Boundary</button>
            <button id="runServerBtn" onclick="detectBoundaryServer()" disabled>Detect Boundary (Server)</button>
            <button id="downloadBtn" onclick="window.location.href='/download_geojson'" disabled>Download GeoJSON</button>
        </div>
    </div>

</body>
</html>
